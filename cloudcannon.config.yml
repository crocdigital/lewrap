_editables:
  text:
    bold: true
    italic: true
    link: true
  content:
    bold: true
    italic: true
    link: true
    format: p h2 h3 h4
    image: true

paths:
  uploads: public/images
  static: public

collections_config:
  pages:
    path: src/pages
    icon: wysiwyg
    url: /[slug]/
    disable_url: false
    _enabled_editors:
      - visual
      - content
      - data
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false

_inputs:
  hero_title:
    type: text
    label: Hero Title
    cascade: true
  hero_subtitle:
    type: text
    label: Hero Subtitle
    cascade: true
  hero_bg_type:
    type: select
    label: Hero Background Type
    comment: "Choose between a solid colour or background image"
    options:
      values:
        - color
        - image
    cascade: true
  hero_bg_colour:
    type: color
    label: Hero Background Colour
    comment: "Only applies if Background Type is 'color'"
    options:
      format: hex
      alpha: false
    cascade: true
  hero_bg_image:
    type: image
    label: Hero Background Image
    comment: "Only applies if Background Type is 'image'. Image will cover the hero section."
    cascade: true
  background_type:
    type: select
    label: Background Type
    comment: "Choose a background for this section (optional)"
    options:
      values:
        - none
        - color
        - image
    cascade: true
  background_colour:
    type: color
    label: Background Colour
    comment: "Only applies if Background Type is set to 'color'. Enter a hex value or use the colour picker."
    options:
      format: hex
      alpha: false
    cascade: true
  background_image:
    type: image
    label: Background Image
    comment: "Only applies if Background Type is set to 'image'. Image will be tiled across the section."
    cascade: true
  page_blocks:
    type: array
    options:
      structures:
        style: select
        values:
          - label: 2 Column
            icon: pause
            value:
              _template: feature
              heading: New Section
              text: <p>Write content here...</p>
              image_path: /uploads/placeholder.jpg
              reverse: false
              background_type: none
              background_colour: ""
              background_image: ""
            _inputs:
              heading:
                type: text
                label: Heading
              text:
                type: html
                options:
                  allow_resize: true
                  allow_custom_markup: false
                  remove_custom_markup: false
                  initial_height: 320
                  bold: true
                  format: p h2 h3 h4
                  image_size_attributes: true
                  italic: true
                label: Content (WYSIWYG)
              image_path:
                type: image
                label: Image
                comment: "Upload a square image (1:1 ratio) for best results. Recommended size: 1000px by 1000px"
              reverse:
                type: switch
                label: Reverse layout
                comment: "Default: Text left, Image right. Toggle ON to swap columns."
              _template:
                hidden: true
          - label: 1 Column
            icon: format_align_center
            value:
              _template: centered_text
              text: <p>Write your content here...</p>
              background_type: none
              background_colour: ""
              background_image: ""
            _inputs:
              text:
                type: html
                options:
                  allow_resize: true
                  allow_custom_markup: false
                  remove_custom_markup: false
                  initial_height: 320
                  bold: true
                  format: p h2 h3 h4
                  image_size_attributes: true
                  italic: true
                label: Content (WYSIWYG)
              _template:
                hidden: true
    label: Page Blocks
    cascade: true

timezone: Australia/Sydney