paths:
  uploads: public/images/[collection]
  static: public
collections_config:
  pages:
    path: src/pages
    icon: wysiwyg
    url: /[slug]/
    disable_url: false
    description: All pages of your website.
    _enabled_editors:
      - visual
      - content
      - data
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
  locations:
    path: src/content/locations
    icon: location_on
    url: /locations/[slug]/
    disable_url: false
    description: Every LeWrap franchise location.
    _enabled_editors:
      - content
      - data
    _inputs:
      name:
        type: text
        label: Store Name
        comment: e.g., LeWrap Parramatta
        cascade: true
      image:
        type: image
        label: Store Image
        comment: Upload a photo of the store. 1000px x 1000px
        cascade: true
    add_options:
      - name: Add Location
        icon: add_location
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
    schemas:
      default:
        path: src/content/locations/_defaults.md
        reorder_inputs: true
        hide_extra_inputs: false
        remove_empty_inputs: false
        remove_extra_inputs: true
  food:
    path: src/content/food
    icon: restaurant_menu
    url: /food/[slug]/
    disable_url: false
    description: All food items listed on RedCat.
    _enabled_editors:
      - content
      - data
    _inputs:
      name:
        type: text
        label: Food Item Name
        comment: e.g., Chicken Caesar Wrap
        cascade: true
      image:
        type: image
        options:
          paths:
            uploads: public/images/food
        label: Item Image
        comment: >-
          Upload a photo of the item. 600px x 600px (use the same image from
          RedCat entry)
        cascade: true
      category:
        type: select
        options:
          allow_create: true
          allow_empty: true
          values:
            - Wraps
            - Plates
            - Baguettes
            - Protein Packs
            - Salads
            - Kids Meals
            - Sides
            - Drinks
        label: Category
        cascade: true
      subcategory:
        type: select
        options:
          allow_create: true
          allow_empty: true
          values:
            - Chicken Wraps
            - Beef Wraps
            - Schnitzel Wraps
            - Lamb Wraps
            - Vegetarian Wraps
            - Kofta Wraps
        label: Subcategory
        comment: Only applies to Wraps category
        cascade: true
      price:
        type: text
        label: Price
        comment: e.g., $14.90
        cascade: true
      description:
        type: html
        options:
          allow_resize: true
          allow_custom_markup: false
          remove_custom_markup: false
          initial_height: 200
          bold: true
          format: p
          image_size_attributes: true
          italic: true
        label: Description
        cascade: true
      kj:
        type: number
        label: Kilojoules (kJ)
        comment: Energy content in kilojoules
        cascade: true
      orderLink:
        type: url
        label: Order Link
        comment: External RedCat POS link for this item
        cascade: true
      available:
        type: switch
        label: Available
        comment: Toggle off to mark as sold out
        cascade: true
    add_options:
      - name: Add Food Item
        icon: add_circle
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
    schemas:
      default:
        path: src/content/food/_defaults.md
        reorder_inputs: true
        hide_extra_inputs: false
        remove_empty_inputs: false
        remove_extra_inputs: true
  faq:
    path: src/content/faq
    icon: help_outline
    url: /faq/[slug]/
    disable_url: false
    description: Every FAQ item. These get filtered to display on their relevant pages.
    _enabled_editors:
      - content
      - data
    _inputs:
      question:
        type: text
        label: Question
        cascade: true
      answer:
        type: html
        options:
          allow_resize: true
          allow_custom_markup: false
          remove_custom_markup: false
          initial_height: 320
          bold: true
          bulletedlist: true
          format: p
          image_size_attributes: true
          italic: true
          link: true
        label: Answer
        cascade: true
      category:
        type: select
        options:
          allow_empty: true
          values:
            - General
            - Catering
            - Franchising
        label: Category
        cascade: true
      order:
        type: number
        label: Display Order
        comment: Lower numbers appear first (0, 1, 2, etc.)
        cascade: true
    add_options:
      - name: Add FAQ
        icon: add_circle
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
    schemas:
      default:
        path: src/content/faq/_defaults.md
        reorder_inputs: true
        hide_extra_inputs: false
        remove_empty_inputs: false
        remove_extra_inputs: true
  newsroom:
    path: src/content/newsroom
    icon: newspaper
    url: /newsroom/[slug]/
    disable_url: false
    description: Your Newsroom articles.
    _enabled_editors:
      - content
      - data
    _inputs:
      hero_image:
        type: image
        options:
          paths:
            uploads: public/images/newsroom
        label: Hero Image
        comment: 'Main image for article (recommended: 1920px x 1080px)'
        cascade: true
      hero_image_mobile:
        type: image
        options:
          paths:
            uploads: public/images/newsroom
        label: Hero Image (Mobile)
        comment: >-
          Optional mobile version. Recommended size: 1000px x 1000px. If not
          provided, desktop image will be used.
        cascade: true
      category:
        type: select
        options:
          allow_empty: true
          values:
            - Franchising
            - Promotion
            - Community
            - Updates
        label: Category
        cascade: true
      featured:
        type: switch
        label: Featured
        comment: Show on newsroom page featured section
        cascade: true
      preview_text:
        type: textarea
        label: Preview Text
        comment: >-
          Short description shown on newsroom listings (150-200 characters
          recommended)
        cascade: true
    add_options:
      - name: Add Article
        icon: add_circle
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
    schemas:
      default:
        path: src/content/newsroom/_defaults.md
        reorder_inputs: true
        hide_extra_inputs: false
        remove_empty_inputs: false
        remove_extra_inputs: true
  popups:
    path: src/content/popups
    icon: web_asset
    disable_url: false
    description: Popups in use on your site.
    _enabled_editors:
      - data
    _inputs:
      popup_id:
        type: select
        options:
          allow_empty: true
          values:
            - newsletter_modal
            - franchise_enquiry
        label: Popup ID
        comment: Which popup this content is for (DO NOT CHANGE)
        hidden: true
        cascade: true
      title:
        type: text
        label: Popup Title
        cascade: true
      description:
        type: html
        options:
          allow_resize: true
          allow_custom_markup: false
          remove_custom_markup: false
          initial_height: 320
          bold: true
          format: p
          image_size_attributes: true
          italic: true
          link: true
        label: Description
        cascade: true
      image:
        type: image
        options:
          paths:
            uploads: public/images/elements
        label: Decorative Image (Optional)
        comment: Optional decorative image (like koftas)
        cascade: true
      image_position:
        type: text
        label: Image Position Classes
        comment: >-
          Tailwind classes for positioning (e.g., 'absolute left-1/2
          -translate-x-1/2 -top-13')
        cascade: true
      show_on_load:
        type: switch
        label: Show on Page Load
        comment: Automatically show this popup when page loads
        cascade: true
      remember_close:
        type: switch
        label: Remember When Closed
        comment: Don't show again after user closes it
        cascade: true
    disable_add: true
    disable_add_folder: false
    disable_file_actions: true
_inputs:
  seo_title:
    type: text
    label: SEO Title
    comment: >-
      Page title for search engines (50-60 characters). Leave blank to use page
      title.
    cascade: true
  seo_description:
    type: textarea
    label: SEO Description
    comment: >-
      Meta description for search results (150-160 characters). Leave blank for
      auto-generated.
    cascade: true
  seo_image:
    type: image
    options:
      paths:
        uploads: public/images/og
    label: SEO / Social Share Image
    comment: >-
      Image shown when sharing on social media (1200px x 630px). Leave blank to
      use default LeWrap image.
    cascade: true
  seo_keywords:
    type: text
    label: SEO Keywords
    comment: >-
      Comma-separated keywords (e.g., healthy wraps, fresh food, australian
      cuisine)
    cascade: true
  seo_robots:
    type: select
    options:
      allow_empty: true
      values:
        - index, follow
        - noindex, follow
        - index, nofollow
        - noindex, nofollow
    label: Search Engine Indexing
    comment: Control how search engines index this page
    cascade: true
  seo_canonical:
    type: text
    label: Canonical URL
    comment: Optional. Override canonical URL (leave blank for auto-generated)
    cascade: true
  hero_slides:
    type: array
    options:
      structures:
        style: select
        values:
          - label: Hero Slide
            value:
              image_desktop: ''
              image_mobile: ''
              alt: ''
            _inputs:
              image_desktop:
                type: image
                options:
                  paths:
                    uploads: public/images/hero
                label: Desktop Image
                comment: >-
                  Desktop/tablet hero image (16:9 ratio) for best results.
                  Recommended size: 1920px x 1080px
                cascade: true
              image_mobile:
                type: image
                options:
                  paths:
                    uploads: public/images/hero
                label: Mobile Image
                comment: >-
                  Upload a square image (1:1 ratio) for best results.
                  Recommended size: 1000px by 1000px
                cascade: true
              alt:
                type: text
                label: Alt Text
                comment: Describe the image for accessibility
                cascade: true
    label: Hero Carousel Slides
    comment: Add images for the homepage hero carousel
    cascade: true
  title:
    type: text
    label: Title
    cascade: true
  description:
    type: html
    options:
      allow_resize: true
      allow_custom_markup: false
      remove_custom_markup: false
      initial_height: 320
      bold: true
      format: p h2 h3 h4
      image_size_attributes: true
      italic: true
      link: true
    label: Description
    cascade: true
  buttonText:
    type: text
    label: Button Text
    cascade: true
  buttonLink:
    type: text
    label: Button Link
    cascade: true
  buttonVariant:
    type: select
    options:
      allow_empty: true
      values:
        - primary
        - secondary
    label: Button Style
    cascade: true
  slides:
    type: array
    options:
      structures:
        style: select
        values:
          - label: Slide
            value:
              image: ''
              alt: ''
            _inputs:
              image:
                type: image
                options:
                  paths:
                    uploads: public/images/carousel
                label: Slide Image
                comment: 'Upload image. Required size: 1200px x 800px'
                cascade: true
              alt:
                type: text
                label: Alt Text
                cascade: true
    label: Carousel Slides
    comment: Add images for the carousel. If empty, shows colored background.
    cascade: true
  welcome_heading:
    type: text
    label: Welcome Heading
    cascade: true
  welcome_text:
    type: html
    options:
      allow_resize: true
      allow_custom_markup: false
      remove_custom_markup: false
      initial_height: 320
      bold: true
      format: p
      image_size_attributes: true
      italic: true
      link: true
    label: Welcome Text
    cascade: true
  welcome_image:
    type: image
    options:
      paths:
        uploads: public/images/homepage
    label: Welcome Image
    comment: 'Image shown on right side (recommended: 629px wide, transparent PNG)'
    cascade: true
  welcome_button_text:
    type: text
    label: Welcome Button Text
    cascade: true
  welcome_button_link:
    type: text
    label: Welcome Button Link
    cascade: true
  lewrapstory_heading:
    type: text
    label: LeWrap Story Heading
    cascade: true
  lewrapstory_text:
    type: html
    options:
      allow_resize: true
      allow_custom_markup: false
      remove_custom_markup: false
      initial_height: 320
      bold: true
      format: p
      image_size_attributes: true
      italic: true
      link: true
    label: LeWrap Story Text
    cascade: true
  lewrapstory_image:
    type: image
    options:
      paths:
        uploads: public/images/homepage
    label: LeWrap Story Image
    comment: 'Image shown on right side (recommended: 1000px × 1000px square)'
    cascade: true
  lewrapstory_button_text:
    type: text
    label: LeWrap Story Button Text
    cascade: true
  lewrapstory_button_link:
    type: text
    label: LeWrap Story Button Link
    cascade: true
  catering_heading:
    type: text
    label: Catering Heading
    cascade: true
  catering_text:
    type: html
    options:
      allow_resize: true
      allow_custom_markup: false
      remove_custom_markup: false
      initial_height: 320
      bold: true
      format: p
      image_size_attributes: true
      italic: true
      link: true
    label: Catering Text
    cascade: true
  catering_image:
    type: image
    options:
      paths:
        uploads: public/images/homepage
    label: Catering Image
    comment: 'Image shown on right side (recommended: 1000px × 1000px square)'
    cascade: true
  catering_button_text:
    type: text
    label: Catering Button Text
    cascade: true
  catering_button_link:
    type: text
    label: Catering Button Link
    cascade: true
  franchise_process_steps:
    type: array
    options:
      structures:
        style: select
        values:
          - label: Process Step
            value:
              title: ''
              description: ''
            _inputs:
              title:
                type: text
                label: Step Title
                cascade: true
              description:
                type: textarea
                label: Step Description
                cascade: true
    label: Franchise Process Steps
    comment: Add steps for the franchise process (numbers auto-generate)
    cascade: true
  terms_content:
    type: html
    options:
      allow_resize: true
      allow_custom_markup: false
      remove_custom_markup: false
      initial_height: 320
      bold: true
      format: p h2 h3 h4
      image_size_attributes: true
      italic: true
      link: true
    label: Terms & Conditions Content
    cascade: true
  privacy_content:
    type: html
    options:
      allow_resize: true
      allow_custom_markup: false
      remove_custom_markup: false
      initial_height: 320
      bold: true
      format: p h2 h3 h4
      image_size_attributes: true
      italic: true
      link: true
    label: Privacy Policy Content
    cascade: true
  address:
    type: text
    label: Street Address
    comment: e.g., 159 Church Street
    cascade: true
  suburb:
    type: text
    label: Suburb
    cascade: true
  state:
    type: text
    label: State
    comment: e.g., NSW
    cascade: true
  postcode:
    type: text
    label: Postcode
    cascade: true
  latitude:
    type: number
    label: Latitude
    comment: >-
      Get this from Google Maps. Right-click on location and type coordinates
      before the 'comma'.
    cascade: true
  longitude:
    type: number
    label: Longitude
    comment: >-
      Get this from Google Maps. Right-click on location and type coordinates
      after the 'comma'.
    cascade: true
  phone:
    type: text
    label: Phone Number
    comment: Optional. Include area code.
    cascade: true
  email:
    type: email
    label: Email Address
    comment: Optional
    cascade: true
  hours:
    type: object
    label: Opening Hours
    cascade: true
    _inputs:
      monday:
        type: text
        label: Monday
        comment: e.g., 9:00 AM - 5:00 PM or Closed
        cascade: true
      tuesday:
        type: text
        label: Tuesday
        cascade: true
      wednesday:
        type: text
        label: Wednesday
        cascade: true
      thursday:
        type: text
        label: Thursday
        cascade: true
      friday:
        type: text
        label: Friday
        cascade: true
      saturday:
        type: text
        label: Saturday
        cascade: true
      sunday:
        type: text
        label: Sunday
        cascade: true
  order_now_link:
    type: url
    label: Order Now Link
    comment: Optional. Link to online ordering for this location
    cascade: true
  latest_deals:
    type: array
    options:
      structures:
        style: select
        values:
          - label: Deal Image
            value:
              image: ''
              alt: ''
            _inputs:
              image:
                type: image
                options:
                  paths:
                    uploads: public/images/deals
                label: Deal Image
                comment: 'Upload deal graphic. Recommended size: 1200px x 800px'
                cascade: true
              alt:
                type: text
                label: Alt Text
                comment: Describe the deal for accessibility
                cascade: true
    label: Latest Deals
    comment: Add promotional deal images (max 4 recommended)
    cascade: true
  catering_callouts:
    type: array
    options:
      structures:
        style: select
        values:
          - label: Callout Item
            value:
              image: ''
              title: ''
              description: ''
            _inputs:
              image:
                type: image
                options:
                  paths:
                    uploads: public/images/icons
                label: Icon/Image
                comment: Upload an SVG icon
                cascade: true
              title:
                type: text
                label: Title
                cascade: true
              description:
                type: textarea
                label: Description
                cascade: true
    label: Catering Callouts
    comment: Add benefits or features for catering
    cascade: true
  category_descriptions.wraps.description:
    type: textarea
    label: Wraps - Description
    cascade: true
  category_descriptions.wraps.subtitle:
    type: text
    label: Wraps - Subtitle
    comment: Optional italic subtitle (e.g., 'Chicken, beef, schnitzel, lamb kofta')
    cascade: true
  category_descriptions.plates.description:
    type: textarea
    label: Plates - Description
    cascade: true
  category_descriptions.plates.subtitle:
    type: text
    label: Plates - Subtitle
    cascade: true
  category_descriptions.baguettes.description:
    type: textarea
    label: Baguettes - Description
    cascade: true
  category_descriptions.baguettes.subtitle:
    type: text
    label: Baguettes - Subtitle
    cascade: true
  category_descriptions.protein_packs.description:
    type: textarea
    label: Protein Packs - Description
    cascade: true
  category_descriptions.protein_packs.subtitle:
    type: text
    label: Protein Packs - Subtitle
    cascade: true
  category_descriptions.salads.description:
    type: textarea
    label: Salads - Description
    cascade: true
  category_descriptions.salads.subtitle:
    type: text
    label: Salads - Subtitle
    cascade: true
  category_descriptions.kids_meals.description:
    type: textarea
    label: Kids Meals - Description
    cascade: true
  category_descriptions.kids_meals.subtitle:
    type: text
    label: Kids Meals - Subtitle
    cascade: true
  category_descriptions.sides.description:
    type: textarea
    label: Sides - Description
    cascade: true
  category_descriptions.sides.subtitle:
    type: text
    label: Sides - Subtitle
    cascade: true
  category_descriptions.drinks.description:
    type: textarea
    label: Drinks - Description
    cascade: true
  category_descriptions.drinks.subtitle:
    type: text
    label: Drinks - Subtitle
    cascade: true
  category_descriptions:
    type: object
    label: Category Descriptions
    comment: Descriptions shown for each food category section
    cascade: true
  wraps_subcategories.chicken.description:
    type: textarea
    label: Chicken Wraps - Description
    cascade: true
  wraps_subcategories.chicken.subtitle:
    type: text
    label: Chicken Wraps - Subtitle
    cascade: true
  wraps_subcategories.beef.description:
    type: textarea
    label: Beef Wraps - Description
    cascade: true
  wraps_subcategories.beef.subtitle:
    type: text
    label: Beef Wraps - Subtitle
    cascade: true
  wraps_subcategories.schnitzel.description:
    type: textarea
    label: Schnitzel Wraps - Description
    cascade: true
  wraps_subcategories.schnitzel.subtitle:
    type: text
    label: Schnitzel Wraps - Subtitle
    cascade: true
  wraps_subcategories.lamb.description:
    type: textarea
    label: Lamb Wraps - Description
    cascade: true
  wraps_subcategories.lamb.subtitle:
    type: text
    label: Lamb Wraps - Subtitle
    cascade: true
  wraps_subcategories.vegetarian.description:
    type: textarea
    label: Vegetarian Wraps - Description
    cascade: true
  wraps_subcategories.vegetarian.subtitle:
    type: text
    label: Vegetarian Wraps - Subtitle
    cascade: true
  wraps_subcategories.kofta.description:
    type: textarea
    label: Kofta Wraps - Description
    cascade: true
  wraps_subcategories.kofta.subtitle:
    type: text
    label: Kofta Wraps - Subtitle
    cascade: true
  wraps_subcategories:
    type: object
    label: Wraps Subcategories
    comment: Descriptions for wrap subcategories
    cascade: true
  hero_title:
    type: text
    label: Hero Title
    cascade: true
  hero_subtitle:
    type: text
    label: Hero Subtitle
    cascade: true
  hero_bg_type:
    type: select
    options:
      allow_empty: true
      values:
        - color
        - image
    label: Hero Background Type
    comment: Choose between a solid colour or background image
    cascade: true
  hero_bg_colour:
    type: color
    options:
      format: hex
      alpha: false
    label: Hero Background Colour
    comment: Only applies if Background Type is 'color'
    cascade: true
  hero_bg_image:
    type: image
    options:
      paths:
        uploads: public/images/hero
    label: Hero Background Image (Desktop)
    comment: >-
      Only applies if Background Type is 'image'. Recommended size: 1920px ×
      1080px or larger.
    cascade: true
  hero_bg_image_mobile:
    type: image
    options:
      paths:
        uploads: public/images/hero
    label: Hero Background Image (Mobile)
    comment: >-
      Optional mobile version. Recommended size: 1000px × 1000px. If not
      provided, desktop image will be used.
    cascade: true
  hero_button_text:
    type: text
    label: Hero Button Text
    comment: Leave empty if you don't want to add a button
    cascade: true
  hero_button_link:
    type: text
    label: Hero Button Link
    comment: Enter the URL or page path (e.g., /our-food)
    cascade: true
  hero_button_variant:
    type: select
    options:
      allow_empty: true
      values:
        - primary
        - secondary
    label: Hero Button Style
    cascade: true
  hero_button_target:
    type: switch
    label: Open Hero Button in New Tab
    comment: Toggle on to open hero button link in a new tab
    cascade: true
  hero_button_download:
    type: switch
    label: Force Download from Hero Button
    comment: Toggle on to download file instead of opening
    cascade: true
  background_type:
    type: select
    options:
      allow_empty: true
      values:
        - none
        - color
        - image
    label: Background Type
    comment: Choose a background for this section (optional)
    cascade: true
  background_colour:
    type: color
    options:
      format: hex
      alpha: false
    label: Background Colour
    comment: >-
      Only applies if Background Type is set to 'color'. Enter a hex value or
      use the colour picker.
    cascade: true
  background_image:
    type: image
    label: Background Image
    comment: >-
      Only applies if Background Type is set to 'image'. Image will be tiled
      across the section.
    cascade: true
  button_text:
    type: text
    label: Button Text
    comment: Leave empty if you don't want to add a button
    cascade: true
  button_link:
    type: text
    label: Button Link
    comment: Enter the URL or page path (e.g., /our-food)
