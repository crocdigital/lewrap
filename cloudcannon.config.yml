collections_config:
  pages:
    path: src/pages
    icon: wysiwyg
    url: /[slug]/
    disable_url: false
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
_inputs:
      page_blocks:
        type: array
        options:
          structures:
            # CHANGE HERE: Use 'values', NOT '_values'
            values:
              - value:
                  _template: hero
                  title: New Hero
                  subtitle: Subtitle here
                  bg_color: bg-gray-100
                label: Hero Section
                icon: title
              - value:
                  _template: feature
                  heading: New Feature
                  text: Description text
                  image_path: /test-image.jpg
                  reverse: false
                label: Feature Section
                icon: short_text
        
        sub_inputs:
          _template:
            hidden: true
          title:
            type: text
            label: Hero Title
          subtitle:
            type: text
            label: Subtitle
          bg_color:
            type: select
            label: Background Color
            options:
              values:
                - value: bg-blue-50
                  label: Light Blue
                - value: bg-gray-100
                  label: Light Gray
                - value: bg-white
                  label: White
          heading:
            type: text
            label: Feature Heading
          text:
            type: markdown
            label: Content
          image_path:
            type: image
            label: Image
          reverse:
            type: switch
            label: Reverse Layout
timezone: Etc/UTC
