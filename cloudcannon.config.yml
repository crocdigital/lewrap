# ========================================
# EDITABLE REGIONS
# ========================================
_editables:
  text:
    bold: true
    italic: true
    link: true
  content:
    bold: true
    italic: true
    link: true
    format: p h2 h3 h4
    image: true

# ========================================
# FILE PATHS
# ========================================
paths:
  uploads: public/images/[collection]
  static: public

# ========================================
# COLLECTIONS
# ========================================
collections_config:
  pages:
    path: src/pages
    icon: wysiwyg
    url: /[slug]/
    disable_url: false
    _enabled_editors:
      - visual
      - content
      - data
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
  
  locations:
    path: src/content/locations
    icon: location_on
    url: /locations/[slug]/
    _enabled_editors:
      - content
      - data
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
    add_options:
      - name: Add Location
        icon: add_location
    schemas:
      default:
        path: src/content/locations/_defaults.md
    _inputs:
      name:
        type: text
        label: Store Name
        comment: "e.g., LeWrap Parramatta"
      image:
        type: image
        label: Store Image
        comment: "Upload a photo of the store. 1000px x 1000px"
  
  food:
    path: src/content/food
    icon: restaurant_menu
    url: /food/[slug]/
    _enabled_editors:
      - content
      - data
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
    add_options:
      - name: Add Food Item
        icon: add_circle
    schemas:
      default:
        path: src/content/food/_defaults.md
    _inputs:
      name:
        type: text
        label: Food Item Name
        comment: "e.g., Chicken Caesar Wrap"
      image:
        type: image
        label: Item Image
        comment: "Upload a photo of the item. 600px x 600px (use the same image from RedCat entry)"
        options:
          paths:
            uploads: public/images/food
      category:
        type: select
        label: Category
        options:
          values:
            - Wraps
            - Plates
            - Baguettes
            - Protein Packs
            - Salads
            - Kids Meals
            - Sides
            - Drinks
          allow_create: true
      subcategory:
        type: select
        label: Subcategory
        comment: "Only applies to Wraps category"
        options:
          values:
            - Chicken Wraps
            - Beef Wraps
            - Schnitzel Wraps
            - Lamb Wraps
            - Vegetarian Wraps
            - Kofta Wraps
          allow_create: true
      price:
        type: text
        label: Price
        comment: "e.g., $14.90"
      description:
        type: html
        options:
          allow_resize: true
          allow_custom_markup: false
          remove_custom_markup: false
          initial_height: 200
          bold: true
          italic: true
          format: p
        label: Description
      kj:
        type: number
        label: Kilojoules (kJ)
        comment: "Energy content in kilojoules"
      orderLink:
        type: url
        label: Order Link
        comment: "External RedCat POS link for this item"
      available:
        type: switch
        label: Available
        comment: "Toggle off to mark as sold out"

  faq:
    path: src/content/faq
    icon: help_outline
    url: /faq/[slug]/
    _enabled_editors:
      - content
      - data
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
    add_options:
      - name: Add FAQ
        icon: add_circle
    schemas:
      default:
        path: src/content/faq/_defaults.md
    _inputs:
      question:
        type: text
        label: Question
      answer:
        type: html
        options:
          allow_resize: true
          bold: true
          italic: true
          link: true
          bulletedlist: true
          format: p
        label: Answer
      category:
        type: select
        label: Category
        options:
          values:
            - General
            - Catering
            - Franchising
      order:
        type: number
        label: Display Order
        comment: "Lower numbers appear first (0, 1, 2, etc.)"

  newsroom:
    path: src/content/newsroom
    icon: newspaper
    url: /newsroom/[slug]/
    _enabled_editors:
      - content
      - data
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
    add_options:
      - name: Add Article
        icon: add_circle
    schemas:
      default:
        path: src/content/newsroom/_defaults.md
    _inputs:
      hero_image:
        type: image
        label: Hero Image
        comment: "Main image for article (recommended: 1920px x 1080px)"
        options:
          paths:
            uploads: public/images/newsroom
      hero_image_mobile:
        type: image
        label: Hero Image (Mobile)
        comment: "Optional mobile version. Recommended size: 1000px x 1000px. If not provided, desktop image will be used."
        options:
          paths:
            uploads: public/images/newsroom
      category:
        type: select
        label: Category
        options:
          values:
            - Franchising
            - Promotion
            - Community
            - Updates
      featured:
        type: switch
        label: Featured
        comment: "Show on newsroom page featured section"
      preview_text:
        type: textarea
        label: Preview Text
        comment: "Short description shown on newsroom listings (150-200 characters recommended)"

  popups:
    path: src/content/popups
    icon: web_asset
    _enabled_editors:
      - data
    disable_add: true
    disable_file_actions: true
    _inputs:
      popup_id:
        type: select
        label: Popup ID
        comment: "Which popup this content is for (DO NOT CHANGE)"
        options:
          values:
            - newsletter_modal
            - franchise_enquiry
        hidden: true
      title:
        type: text
        label: Popup Title
      description:
        type: html
        label: Description
        options:
          bold: true
          italic: true
          link: true
          format: p
          allow_resize: true
      image:
        type: image
        label: Decorative Image (Optional)
        comment: "Optional decorative image (like koftas)"
        options:
          paths:
            uploads: public/images/elements
      image_position:
        type: text
        label: Image Position Classes
        comment: "Tailwind classes for positioning (e.g., 'absolute left-1/2 -translate-x-1/2 -top-13')"
      show_on_load:
        type: switch
        label: Show on Page Load
        comment: "Automatically show this popup when page loads"
      remember_close:
        type: switch
        label: Remember When Closed
        comment: "Don't show again after user closes it"

# ========================================
# INPUT DEFINITIONS (NUCLEAR FIX)
# ========================================
_inputs:

  # ------------------------------------
  # SEO INPUTS
  # ------------------------------------
  seo_title:
    type: text
    label: SEO Title
    comment: "Page title for search engines (50-60 characters). Leave blank to use page title."
    cascade: true

  seo_description:
    type: textarea
    label: SEO Description
    comment: "Meta description for search results (150-160 characters). Leave blank for auto-generated."
    cascade: true

  seo_image:
    type: image
    label: SEO / Social Share Image
    comment: "Image shown when sharing on social media (1200px x 630px). Leave blank to use default LeWrap image."
    options:
      paths:
        uploads: public/images/og
    cascade: true

  seo_keywords:
    type: text
    label: SEO Keywords
    comment: "Comma-separated keywords (e.g., healthy wraps, fresh food, australian cuisine)"
    cascade: true

  seo_robots:
    type: select
    label: Search Engine Indexing
    comment: "Control how search engines index this page"
    options:
      values:
        - "index, follow"
        - "noindex, follow"
        - "index, nofollow"
        - "noindex, nofollow"
    cascade: true

  seo_canonical:
    type: text
    label: Canonical URL
    comment: "Optional. Override canonical URL (leave blank for auto-generated)"
    cascade: true
  
  # ------------------------------------
  # HERO SLIDER - HOMEPAGE
  # ------------------------------------
  hero_slides:
    type: array
    label: Hero Carousel Slides
    comment: "Add images for the homepage hero carousel"
    cascade: true
    options:
      structures:
        values:
          - label: Hero Slide
            value:
              image_desktop: ""
              image_mobile: ""
              alt: ""
            _inputs:
              image_desktop:
                type: image
                label: Desktop Image
                comment: "Desktop/tablet hero image (16:9 ratio) for best results. Recommended size: 1920px x 1080px"
                options:
                  paths:
                    uploads: public/images/hero
              image_mobile:
                type: image
                label: Mobile Image
                comment: "Upload a square image (1:1 ratio) for best results. Recommended size: 1000px by 1000px"
                options:
                  paths:
                    uploads: public/images/hero
              alt:
                type: text
                label: Alt Text
                comment: "Describe the image for accessibility"

  # ------------------------------------
  # FLEXIBLE TWO COLUMN INPUTS
  # ------------------------------------
  title:
    type: text
    label: Title
  
  description:
    type: html
    label: Description
    options:
      bold: true
      italic: true
      link: true
      format: p h2 h3 h4
      allow_resize: true
  
  buttonText:
    type: text
    label: Button Text
  
  buttonLink:
    type: text
    label: Button Link
  
  buttonVariant:
    type: select
    label: Button Style
    options:
      values:
        - primary
        - secondary

  slides:
    type: array
    label: Carousel Slides
    comment: "Add images for the carousel. If empty, shows colored background."
    options:
      structures:
        values:
          - label: Slide
            value:
              image: ""
              alt: ""
            _inputs:
              image:
                type: image
                label: Slide Image
                comment: "Upload image. Required size: 1200px x 800px"
                options:
                  paths:
                    uploads: public/images/carousel
              alt:
                type: text
                label: Alt Text
  
  # ------------------------------------
  # WELCOME SECTION - HOMEPAGE
  # ------------------------------------
  welcome_heading:
    type: text
    label: Welcome Heading
    cascade: true

  welcome_text:
    type: html
    label: Welcome Text
    options:
      bold: true
      italic: true
      link: true
      format: p
      allow_resize: true
    cascade: true

  welcome_image:
    type: image
    label: Welcome Image
    comment: "Image shown on right side (recommended: 629px wide, transparent PNG)"
    options:
      paths:
        uploads: public/images/homepage
    cascade: true

  welcome_button_text:
    type: text
    label: Welcome Button Text
    cascade: true

  welcome_button_link:
    type: text
    label: Welcome Button Link
    cascade: true

  # ------------------------------------
  # LEWRAP STORY SECTION - HOMEPAGE
  # ------------------------------------
  lewrapstory_heading:
    type: text
    label: LeWrap Story Heading
    cascade: true

  lewrapstory_text:
    type: html
    label: LeWrap Story Text
    options:
      bold: true
      italic: true
      link: true
      format: p
      allow_resize: true
    cascade: true

  lewrapstory_image:
    type: image
    label: LeWrap Story Image
    comment: "Image shown on right side (recommended: 1000px × 1000px square)"
    options:
      paths:
        uploads: public/images/homepage
    cascade: true

  lewrapstory_button_text:
    type: text
    label: LeWrap Story Button Text
    cascade: true

  lewrapstory_button_link:
    type: text
    label: LeWrap Story Button Link
    cascade: true

  # ------------------------------------
  # CATERING SECTION - HOMEPAGE
  # ------------------------------------
  catering_heading:
    type: text
    label: Catering Heading
    cascade: true

  catering_text:
    type: html
    label: Catering Text
    options:
      bold: true
      italic: true
      link: true
      format: p
      allow_resize: true
    cascade: true

  catering_image:
    type: image
    label: Catering Image
    comment: "Image shown on right side (recommended: 1000px × 1000px square)"
    options:
      paths:
        uploads: public/images/homepage
    cascade: true

  catering_button_text:
    type: text
    label: Catering Button Text
    cascade: true

  catering_button_link:
    type: text
    label: Catering Button Link
    cascade: true

  # ------------------------------------
  # FRANCHISE PROCESS INPUTS
  # ------------------------------------
  franchise_process_steps:
    type: array
    label: Franchise Process Steps
    comment: "Add steps for the franchise process (numbers auto-generate)"
    cascade: true
    options:
      structures:
        values:
          - label: Process Step
            value:
              title: ""
              description: ""
            _inputs:
              title:
                type: text
                label: Step Title
              description:
                type: textarea
                label: Step Description
  
  # ------------------------------------
  # POLICIES INPUTS (TERMS & PRIVACY)
  # ------------------------------------
  terms_content:
    type: html
    label: Terms & Conditions Content
    options:
      bold: true
      italic: true
      link: true
      format: p h2 h3 h4
      allow_resize: true
    cascade: true

  privacy_content:
    type: html
    label: Privacy Policy Content
    options:
      bold: true
      italic: true
      link: true
      format: p h2 h3 h4
      allow_resize: true
    cascade: true
  
  # ------------------------------------
  # LOCATION-SPECIFIC INPUTS
  # ------------------------------------
  address:
    type: text
    label: Street Address
    comment: "e.g., 159 Church Street"
  
  suburb:
    type: text
    label: Suburb
  
  state:
    type: text
    label: State
    comment: "e.g., NSW"
  
  postcode:
    type: text
    label: Postcode
  
  latitude:
    type: number
    label: Latitude
    comment: "Get this from Google Maps. Right-click on location and type coordinates before the 'comma'."
  
  longitude:
    type: number
    label: Longitude
    comment: "Get this from Google Maps. Right-click on location and type coordinates after the 'comma'."
  
  phone:
    type: text
    label: Phone Number
    comment: "Optional. Include area code."
  
  email:
    type: email
    label: Email Address
    comment: "Optional"
  
  hours:
    type: object
    label: Opening Hours
    _inputs:
      monday:
        type: text
        label: Monday
        comment: "e.g., 9:00 AM - 5:00 PM or Closed"
      tuesday:
        type: text
        label: Tuesday
      wednesday:
        type: text
        label: Wednesday
      thursday:
        type: text
        label: Thursday
      friday:
        type: text
        label: Friday
      saturday:
        type: text
        label: Saturday
      sunday:
        type: text
        label: Sunday
  
  order_now_link:
    type: url
    label: Order Now Link
    comment: "Optional. Link to online ordering for this location"
  
  # ------------------------------------
  # LATEST DEALS
  # ------------------------------------
  latest_deals:
    type: array
    label: Latest Deals
    comment: "Add promotional deal images (max 4 recommended)"
    cascade: true
    options:
      structures:
        values:
          - label: Deal Image
            value:
              image: ""
              alt: ""
            _inputs:
              image:
                type: image
                label: Deal Image
                comment: "Upload deal graphic. Recommended size: 1200px x 800px"
                options:
                  paths:
                    uploads: public/images/deals
              alt:
                type: text
                label: Alt Text
                comment: "Describe the deal for accessibility"

  # ------------------------------------
  # CATERING CALLOUTS
  # ------------------------------------
  catering_callouts:
    type: array
    label: Catering Callouts
    comment: "Add benefits or features for catering"
    cascade: true
    options:
      structures:
        values:
          - label: Callout Item
            value:
              image: ""
              title: ""
              description: ""
            _inputs:
              image:
                type: image
                label: Icon/Image
                comment: "Upload an SVG icon"
                options:
                  paths:
                    uploads: public/images/icons
              title:
                type: text
                label: Title
              description:
                type: textarea
                label: Description
  
  # ------------------------------------
  # CATEGORY DESCRIPTIONS
  # ------------------------------------
  "category_descriptions.wraps.description":
    type: textarea
    label: Wraps - Description
    cascade: true
  
  "category_descriptions.wraps.subtitle":
    type: text
    label: Wraps - Subtitle
    comment: "Optional italic subtitle (e.g., 'Chicken, beef, schnitzel, lamb kofta')"
    cascade: true
  
  "category_descriptions.plates.description":
    type: textarea
    label: Plates - Description
    cascade: true
  
  "category_descriptions.plates.subtitle":
    type: text
    label: Plates - Subtitle
    cascade: true
  
  "category_descriptions.baguettes.description":
    type: textarea
    label: Baguettes - Description
    cascade: true
  
  "category_descriptions.baguettes.subtitle":
    type: text
    label: Baguettes - Subtitle
    cascade: true
  
  "category_descriptions.protein_packs.description":
    type: textarea
    label: Protein Packs - Description
    cascade: true
  
  "category_descriptions.protein_packs.subtitle":
    type: text
    label: Protein Packs - Subtitle
    cascade: true
  
  "category_descriptions.salads.description":
    type: textarea
    label: Salads - Description
    cascade: true
  
  "category_descriptions.salads.subtitle":
    type: text
    label: Salads - Subtitle
    cascade: true
  
  "category_descriptions.kids_meals.description":
