    label: Sides - Subtitle
    cascade: true
  
  "category_descriptions.drinks.description":
    type: textarea
    label: Drinks - Description
    cascade: true
  
  "category_descriptions.drinks.subtitle":
    type: text
    label: Drinks - Subtitle
    cascade: true
  
  category_descriptions:
    type: object
    label: Category Descriptions
    comment: "Descriptions shown for each food category section"
    cascade: true
  
  # ------------------------------------
  # WRAPS SUBCATEGORY DESCRIPTIONS
  # ------------------------------------
  "wraps_subcategories.chicken.description":
    type: textarea
    label: Chicken Wraps - Description
    cascade: true
  
  "wraps_subcategories.chicken.subtitle":
    type: text
    label: Chicken Wraps - Subtitle
    cascade: true
  
  "wraps_subcategories.beef.description":
    type: textarea
    label: Beef Wraps - Description
    cascade: true
  
  "wraps_subcategories.beef.subtitle":
    type: text
    label: Beef Wraps - Subtitle
    cascade: true
  
  "wraps_subcategories.schnitzel.description":
    type: textarea
    label: Schnitzel Wraps - Description
    cascade: true
  
  "wraps_subcategories.schnitzel.subtitle":
    type: text
    label: Schnitzel Wraps - Subtitle
    cascade: true
  
  "wraps_subcategories.lamb.description":
