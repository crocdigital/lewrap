paths:
  uploads: public/images    # Store files inside the Astro public folder
  static: public            # Tell CC that 'public' is the root for URLs
collections_config:
  pages:
    path: src/pages
    output: true            # <--- THIS LINE IS MISSING & REQUIRED
    icon: wysiwyg
    url: /[relative_base_path]/[slug]/
    disable_url: false
    _enabled_editors:       # <--- ADD THIS BLOCK TO FORCE THE VISUAL TAB
      - visual
      - content
      - data
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
_inputs:
  page_blocks:
    type: array
    options:
      structures:
        style: select
        values:
          - icon: title
            label: Hero Section
            value:
              _template: hero
              title: New Hero
              subtitle: Subtitle here
              bg_color: bg-gray-100
          - icon: short_text
            label: Feature Section
            value:
              _template: feature
              heading: New Feature
              text: Description text
              image_path: /test-image.jpg
              reverse: false
    cascade: true
    sub_inputs:
      _template:
        hidden: true
      title:
        type: text
        label: Hero Title
      subtitle:
        type: text
        label: Subtitle
      bg_color:
        type: select
        label: Background Color
        options: {}
      heading:
        type: text
        label: Feature Heading
      text:
        type: markdown
        label: Content
      image_path:
        type: image
        label: Image
      reverse:
        type: switch
        label: Reverse Layout
timezone: Etc/UTC
