    comment: "Enter the URL or page path (e.g., /our-food)"
    cascade: true
  
  hero_button_variant:
    type: select
    label: Hero Button Style
    options:
      values:
        - primary
        - secondary
    cascade: true
  
  # ------------------------------------
  # PAGE BLOCK INPUTS
  # ------------------------------------
  background_type:
    type: select
    label: Background Type
    comment: "Choose a background for this section (optional)"
    options:
      values:
        - none
        - color
        - image
    cascade: true
  
  background_colour:
    type: color
    label: Background Colour
    comment: "Only applies if Background Type is set to 'color'. Enter a hex value or use the colour picker."
    options:
      format: hex
      alpha: false
    cascade: true
  
  background_image:
    type: image
    label: Background Image
    comment: "Only applies if Background Type is set to 'image'. Image will be tiled across the section."
    cascade: true
  
  button_text:
    type: text
    label: Button Text
    comment: "Leave empty if you don't want to add a button"
    cascade: true
  
  button_link:
    type: text
    label: Button Link
    comment: "Enter the URL or page path (e.g., /our-food)"
    cascade: true
  
  button_variant:
    type: select
    label: Button Style
    options:
      values:
        - primary
        - secondary
    cascade: true
  
  page_blocks:
    type: array
    options:
      structures:
        style: select
        values:
          - label: 2 Column
            icon: pause
            value:
              _template: feature
              heading: New Section
              text: <p>Write content here...</p>
              image_path: ""
              video_url: ""
              reverse: false
              background_type: none
              background_colour: ""
              background_image: ""
              button_text: ""
              button_link: ""
              button_variant: primary
              button_target: ""
              button_download: false
            _inputs:
              heading:
                type: text
                label: Heading
              text:
                type: html
                options:
                  allow_resize: true
                  allow_custom_markup: false
                  remove_custom_markup: false
                  initial_height: 320
                  bold: true
                  format: p h2 h3 h4
                  image_size_attributes: true
                  italic: true
                  link: true
                label: Content (WYSIWYG)
              image_path:
                type: image
                label: Image
                comment: "Upload a square image (1:1 ratio) for best results. Recommended size: 1000px by 1000px"
              video_url:
                type: text
                label: Video URL (Vimeo)
                comment: "Paste full Vimeo URL (e.g., https://vimeo.com/123456789). Leave blank if using image."
              reverse:
                type: switch
                label: Reverse layout
                comment: "Default: Text left, Image right. Toggle ON to swap columns."
              button_text:
                type: text
                label: Button Text
                comment: "Leave empty to hide button"
              button_link:
                type: text
                label: Button Link
              button_variant:
                type: select
                label: Button Style
                options:
                  values:
                    - primary
                    - secondary
              button_target:
