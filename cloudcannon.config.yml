paths:
  uploads: public/images
  static: public

collections_config:
  pages:
    path: src/pages
    output: true
    icon: wysiwyg
    url: /[relative_base_path]/[slug]/
    disable_url: false
    disable_add: false
    _enabled_editors:
      - visual
      - content
      - data

_inputs:
  # --- THE SLEDGEHAMMER ---
  # By placing this here, it applies to ANY field named 'text' anywhere on your site.
  # This bypasses the nesting/scoping issues completely.
  text:
    type: html
    label: Content
    options:
      bold: true
      italic: true
      link: true
      bulleted_list: true
      numbered_list: true
      format: p h2 h3 h4
  # ------------------------

  page_blocks:
    type: array
    cascade: true
    options:
      structures:
        values:
          - icon: title
            label: Hero Section
            value:
              _template: hero
              title: New Hero
              subtitle: Subtitle here
              bg_color: bg-gray-100
          - icon: short_text
            label: Feature Section
            value:
              _template: feature
              heading: New Feature
              text: Description text
              image_path: /test-image.jpg
              reverse: false
    
    sub_inputs:
      _template:
        hidden: true
      title:
        type: text
        label: Hero Title
      subtitle:
        type: text
        label: Subtitle
      bg_color:
        type: select
        label: Background Color
        options:
          values:
            - value: bg-blue-50
              label: Light Blue
            - value: bg-gray-100
              label: Light Gray
            - value: bg-white
              label: White
            - value: bg-black
              label: Black
      heading:
        type: text
        label: Feature Heading
      image_path:
        type: image
        label: Image
      reverse:
        type: switch
        label: Reverse Layout

timezone: Australia/Sydney