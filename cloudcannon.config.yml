_editables:
  text:
    bold: true
    italic: true
    link: true
  content:
    bold: true
    italic: true
    link: true
    format: p h2 h3 h4
    image: true

paths:
  uploads: public/images/[collection]
  static: public

collections_config:
  pages:
    path: src/pages
    icon: wysiwyg
    url: /[slug]/
    disable_url: false
    _enabled_editors:
      - visual
      - content
      - data
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
  
  locations:
    path: src/content/locations
    icon: location_on
    url: /locations/[slug]/
    _enabled_editors:
      - content
      - data
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
    add_options:
      - name: Add Location
        icon: add_location
    #TESTING THIS
    _inputs:
      "franchise_callout.text":
        type: html
        options:
          height: 300
          toolbar: bold italic link bulletlist orderedlist
    schemas:
      default:
        path: src/content/locations/_defaults.md

_inputs:
  name:
    type: text
    label: Store Name
    comment: "e.g., LeWrap Parramatta"
  address:
    type: text
    label: Street Address
    comment: "e.g., 159 Church Street"
  suburb:
    type: text
    label: Suburb
  state:
    type: text
    label: State
    comment: "e.g., NSW"
  postcode:
    type: text
    label: Postcode
  latitude:
    type: number
    label: Latitude
    comment: "Get this from Google Maps. Right-click on location and type coordinates before the 'comma'."
  longitude:
    type: number
    label: Longitude
    comment: "Get this from Google Maps. Right-click on location and type coordinates after the 'comma'."
  phone:
    type: text
    label: Phone Number
    comment: "Optional. Include area code."
  email:
    type: email
    label: Email Address
    comment: "Optional"
  hours:
    type: object
    label: Opening Hours
    _inputs:
      monday:
        type: text
        label: Monday
        comment: "e.g., 9:00 AM - 5:00 PM or Closed"
      tuesday:
        type: text
        label: Tuesday
      wednesday:
        type: text
        label: Wednesday
      thursday:
        type: text
        label: Thursday
      friday:
        type: text
        label: Friday
      saturday:
        type: text
        label: Saturday
      sunday:
        type: text
        label: Sunday
  image:
    type: image
    label: Store Image
    comment: "Upload a photo of the store. 1200px x 800px"
  order_now_link:
    type: url
    label: Order Now Link
    comment: "Optional. Link to online ordering for this location"
  featured:
    type: switch
    label: Featured Location
    comment: "Toggle on to highlight this location"
  
  hero_title:
    type: text
    label: Hero Title
    cascade: true
  hero_subtitle:
    type: text
    label: Hero Subtitle
    cascade: true
  hero_bg_type:
    type: select
    label: Hero Background Type
    comment: "Choose between a solid colour or background image"
    options:
      values:
        - color
        - image
    cascade: true
  hero_bg_colour:
    type: color
    label: Hero Background Colour
    comment: "Only applies if Background Type is 'color'"
    options:
      format: hex
      alpha: false
    cascade: true
  hero_bg_image:
    type: image
    label: Hero Background Image (Desktop)
    comment: "Only applies if Background Type is 'image'. Recommended size: 1920px × 1080px or larger."
    cascade: true
  hero_bg_image_mobile:
    type: image
    label: Hero Background Image (Mobile)
    comment: "Optional mobile version. Recommended size: 1000px × 1000px. If not provided, desktop image will be used."
    cascade: true
  hero_button_text:
    type: text
    label: Hero Button Text
    comment: "Leave empty if you don't want to add a button"
    cascade: true
  hero_button_link:
    type: text
    label: Hero Button Link
    comment: "Enter the URL or page path (e.g., /our-food)"
    cascade: true
  hero_button_variant:
    type: select
    label: Hero Button Style
    options:
      values:
        - primary
        - secondary
    cascade: true
  background_type:
    type: select
    label: Background Type
    comment: "Choose a background for this section (optional)"
    options:
      values:
        - none
        - color
        - image
    cascade: true
  background_colour:
    type: color
    label: Background Colour
    comment: "Only applies if Background Type is set to 'color'. Enter a hex value or use the colour picker."
    options:
      format: hex
      alpha: false
    cascade: true
  background_image:
    type: image
    label: Background Image
    comment: "Only applies if Background Type is set to 'image'. Image will be tiled across the section."
    cascade: true
  button_text:
    type: text
    label: Button Text
    comment: "Leave empty if you don't want to add a button"
    cascade: true
  button_link:
    type: text
    label: Button Link
    comment: "Enter the URL or page path (e.g., /our-food)"
    cascade: true
  button_variant:
    type: select
    label: Button Style
    options:
      values:
        - primary
        - secondary
    cascade: true
  page_blocks:
    type: array
    options:
      structures:
        style: select
        values:
          - label: 2 Column
            icon: pause
            value:
              _template: feature
              heading: New Section
              text: <p>Write content here...</p>
              image_path: /uploads/placeholder.jpg
              reverse: false
              background_type: none
              background_colour: ""
              background_image: ""
              button_text: ""
              button_link: ""
              button_variant: primary
            _inputs:
              heading:
                type: text
                label: Heading
              text:
                type: html
                options:
                  allow_resize: true
                  allow_custom_markup: false
                  remove_custom_markup: false
                  initial_height: 320
                  bold: true
                  format: p h2 h3 h4
                  image_size_attributes: true
                  italic: true
                label: Content (WYSIWYG)
              image_path:
                type: image
                label: Image
                comment: "Upload a square image (1:1 ratio) for best results. Recommended size: 1000px by 1000px"
              reverse:
                type: switch
                label: Reverse layout
                comment: "Default: Text left, Image right. Toggle ON to swap columns."
              _template:
                hidden: true
          - label: 1 Column
            icon: format_align_center
            value:
              _template: centered_text
              text: <p>Write your content here...</p>
              background_type: none
              background_colour: ""
              background_image: ""
              button_text: ""
              button_link: ""
              button_variant: primary
            _inputs:
              text:
                type: html
                options:
                  allow_resize: true
                  allow_custom_markup: false
                  remove_custom_markup: false
                  initial_height: 320
                  bold: true
                  format: p h2 h3 h4
                  image_size_attributes: true
                  italic: true
                label: Content (WYSIWYG)
              _template:
                hidden: true
    label: Page Blocks
    cascade: true
  
  # Franchise callout as a grouped object
  franchise_callout:
    type: object
    label: Franchise Callout
    comment: "Configure the 'Own a Store' section"
    cascade: true
    _inputs:
      show:
        type: switch
        label: Show Franchise Callout
      heading:
        type: text
        label: Heading
      # text:
      "franchise_callout.text":
        type: html
        options:
          allow_resize: true
          allow_custom_markup: false
          remove_custom_markup: false
          initial_height: 320
          bold: true
          format: p h2 h3 h4
          image_size_attributes: true
          italic: true
        label: Content (WYSIWYG)
      image:
        type: image
        label: Image
      button_text:
        type: text
        label: Button Text
      button_link:
        type: text
        label: Button Link

timezone: Australia/Sydney