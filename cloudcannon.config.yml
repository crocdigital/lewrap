paths:
  uploads: public/images
  static: public

collections_config:
  pages:
    path: src/pages
    output: true
    icon: wysiwyg
    url: /[relative_base_path]/[slug]/
    disable_url: false
    disable_add: false
    _enabled_editors:
      - visual
      - content
      - data

_inputs:
  # -----------------------------------------------------------
  # GLOBAL INPUT DEFINITIONS
  # -----------------------------------------------------------
  
  # 1. HTML Text Editor (Sledgehammer)
  text:
    type: html
    label: Content
    options:
      bold: true
      italic: true
      link: true
      bulleted_list: true
      numbered_list: true
      format: p h2 h3 h4

  # 2. Image Uploader with Square Hint
  image_path:
    type: image
    label: Image
    comment: "Please upload a square image (1:1 ratio) for best results."

  # 3. Reverse Switch (Renamed as requested)
  reverse:
    type: switch
    label: Reverse columns

  # -----------------------------------------------------------
  # FIXED HERO INPUTS (These appear in the Page Data / Sidebar)
  # -----------------------------------------------------------
  hero_title:
    type: text
    label: Hero Title
  hero_subtitle:
    type: text
    label: Hero Subtitle
  hero_bg:
    type: select
    label: Hero Background
    options:
      values:
        - value: bg-blue-50
          label: Light Blue
        - value: bg-gray-100
          label: Light Gray
        - value: bg-white
          label: White
        - value: bg-black
          label: Black

  # -----------------------------------------------------------
  # PAGE BLOCKS (The Drag-and-Drop)
  # -----------------------------------------------------------
  page_blocks:
    type: array
    cascade: true
    options:
      structures:
        values:
          # (Hero Removed)
          
          # Renamed to "2 Column"
          - icon: short_text
            label: 2 Column
            value:
              _template: feature
              heading: New 2 Column Section
              text: Description text
              image_path: /test-image.jpg
              reverse: false
    
    sub_inputs:
      _template:
        hidden: true
      heading:
        type: text
        label: Feature Heading
      # Note: text, image_path, and reverse are handled by the Global Inputs above

timezone: Australia/Sydney