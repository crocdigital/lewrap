paths:
  uploads: public/images
  static: public

collections_config:
  pages:
    path: src/pages
    output: true
    icon: wysiwyg
    _enabled_editors:
      - visual
      - content
      - data

_inputs:
  # -----------------------------------------------------------
  # HERO (Sidebar)
  # -----------------------------------------------------------
  hero_title:
    type: text
  hero_subtitle:
    type: text
  hero_bg:
    type: select
    options:
      values:
        - value: bg-white
          label: White
        - value: bg-black
          label: Black

  # -----------------------------------------------------------
  # PAGE BLOCKS (The Array)
  # -----------------------------------------------------------
  page_blocks:
    type: array
    label: Page Blocks
    options:
      structures:
        values:
          - label: 2 Column Feature
            icon: short_text
            value:
              _template: feature
              heading: New Section
              text: <p>Write content here...</p>
              image_path: /uploads/placeholder.jpg
              reverse: false
            
            # FORCE DEFINITIONS HERE (No Globals)
            _inputs:
              heading:
                type: text
                label: Feature Heading
              text:
                type: html
                label: Content (WYSIWYG)
                options:
                  bold: true
                  italic: true
                  format: p h2 h3
              image_path:
                type: image
                label: Image
              reverse:
                type: switch
                label: Reverse Layout
              _template:
                hidden: true

timezone: Australia/Sydney