# ========================================
# EDITABLE REGIONS
# ========================================
_editables:
  text:
    bold: true
    italic: true
    link: true
  content:
    bold: true
    italic: true
    link: true
    format: p h2 h3 h4
    image: true

# ========================================
# FILE PATHS
# ========================================
paths:
  uploads: public/images/[collection]
  static: public

# ========================================
# COLLECTIONS
# ========================================
collections_config:
  pages:
    path: src/pages
    icon: wysiwyg
    url: /[slug]/
    disable_url: false
    _enabled_editors:
      - visual
      - content
      - data
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
  
  locations:
    path: src/content/locations
    icon: location_on
    url: /locations/[slug]/
    _enabled_editors:
      - content
      - data
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
    add_options:
      - name: Add Location
        icon: add_location
    schemas:
      default:
        path: src/content/locations/_defaults.md
  
  food:
    path: src/content/food
    icon: restaurant_menu
    url: /food/[slug]/
    _enabled_editors:
      - content
      - data
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
    add_options:
      - name: Add Food Item
        icon: add_circle
    schemas:
      default:
        path: src/content/food/_defaults.md
      path_options:
      - name: name
        path: '{name|slugify}.md'

# ========================================
# INPUT DEFINITIONS
# ========================================
_inputs:
  
  # ------------------------------------
  # SHARED INPUTS (used by multiple collections)
  # ------------------------------------
  name:
    type: text
    label: Name
    comment: "Name of the item (store or food)"
  
  image:
    type: image
    label: Image
    comment: "Upload an image"
  
  # ------------------------------------
  # LOCATION-SPECIFIC INPUTS
  # ------------------------------------
  address:
    type: text
    label: Street Address
    comment: "e.g., 159 Church Street"
  
  suburb:
    type: text
    label: Suburb
  
  state:
    type: text
    label: State
    comment: "e.g., NSW"
  
  postcode:
    type: text
    label: Postcode
  
  latitude:
    type: number
    label: Latitude
    comment: "Get this from Google Maps. Right-click on location and type coordinates before the 'comma'."
  
  longitude:
    type: number
    label: Longitude
    comment: "Get this from Google Maps. Right-click on location and type coordinates after the 'comma'."
  
  phone:
    type: text
    label: Phone Number
    comment: "Optional. Include area code."
  
  email:
    type: email
    label: Email Address
    comment: "Optional"
  
  hours:
    type: object
    label: Opening Hours
    _inputs:
      monday:
        type: text
        label: Monday
        comment: "e.g., 9:00 AM - 5:00 PM or Closed"
      tuesday:
        type: text
        label: Tuesday
      wednesday:
        type: text
        label: Wednesday
      thursday:
        type: text
        label: Thursday
      friday:
        type: text
        label: Friday
      saturday:
        type: text
        label: Saturday
      sunday:
        type: text
        label: Sunday
  
  order_now_link:
    type: url
    label: Order Now Link
    comment: "Optional. Link to online ordering for this location"
  
  featured:
    type: switch
    label: Featured Location
    comment: "Toggle on to highlight this location"
  
  # ------------------------------------
  # FOOD ITEM-SPECIFIC INPUTS
  # ------------------------------------
  category:
    type: select
    label: Category
    options:
      values:
        - Wraps
        - Plates
        - Baguettes
        - Protein Packs
        - Salads
        - Kids Meals
        - Drinks
      allow_create: true
  
  price:
    type: text
    label: Price
    comment: "e.g., $14.90"
  
  description:
    type: html
    options:
      allow_resize: true
      allow_custom_markup: false
      remove_custom_markup: false
      initial_height: 200
      bold: true
      italic: true
      format: p
    label: Description
    comment: "Brief description of the food item"
  
  kj:
    type: number
    label: Kilojoules (kJ)
    comment: "Energy content in kilojoules"
  
  orderLink:
    type: url
    label: Order Link
    comment: "External RedCat POS link for this item"
  
  available:
    type: switch
    label: Available
    comment: "Toggle off to mark as sold out"
  
  # ------------------------------------
  # CATEGORY DESCRIPTIONS
  # ------------------------------------
  "category_descriptions.wraps.description":
    type: textarea
    label: Wraps - Description
    cascade: true
  
  "category_descriptions.wraps.subtitle":
    type: text
    label: Wraps - Subtitle
    comment: "Optional italic subtitle (e.g., 'Chicken, beef, schnitzel, lamb kofta')"
    cascade: true
  
  "category_descriptions.plates.description":
    type: textarea
    label: Plates - Description
    cascade: true
  
  "category_descriptions.plates.subtitle":
    type: text
    label: Plates - Subtitle
    cascade: true
  
  "category_descriptions.baguettes.description":
    type: textarea
    label: Baguettes - Description
    cascade: true
  
  "category_descriptions.baguettes.subtitle":
    type: text
    label: Baguettes - Subtitle
    cascade: true
  
  "category_descriptions.protein_packs.description":
    type: textarea
    label: Protein Packs - Description
    cascade: true
  
  "category_descriptions.protein_packs.subtitle":
    type: text
    label: Protein Packs - Subtitle
    cascade: true
  
  "category_descriptions.salads.description":
    type: textarea
    label: Salads - Description
    cascade: true
  
  "category_descriptions.salads.subtitle":
    type: text
    label: Salads - Subtitle
    cascade: true
  
  "category_descriptions.kids_meals.description":
    type: textarea
    label: Kids Meals - Description
    cascade: true
  
  "category_descriptions.kids_meals.subtitle":
    type: text
    label: Kids Meals - Subtitle
    cascade: true
  
  "category_descriptions.drinks.description":
    type: textarea
    label: Drinks - Description
    cascade: true
  
  "category_descriptions.drinks.subtitle":
    type: text
    label: Drinks - Subtitle
    cascade: true
  
  category_descriptions:
    type: object
    label: Category Descriptions
    comment: "Descriptions shown for each food category section"
    cascade: true
  
  # ------------------------------------
  # HERO BLOCK INPUTS
  # ------------------------------------
  hero_title:
    type: text
    label: Hero Title
    cascade: true
  
  hero_subtitle:
    type: text
    label: Hero Subtitle
    cascade: true
  
  hero_bg_type:
    type: select
    label: Hero Background Type
    comment: "Choose between a solid colour or background image"
    options:
      values:
        - color
        - image
    cascade: true
  
  hero_bg_colour:
    type: color
    label: Hero Background Colour
    comment: "Only applies if Background Type is 'color'"
    options:
      format: hex
      alpha: false
    cascade: true
  
  hero_bg_image:
    type: image
    label: Hero Background Image (Desktop)
    comment: "Only applies if Background Type is 'image'. Recommended size: 1920px × 1080px or larger."
    cascade: true
    options:
      paths:
        uploads: public/images/hero
  
  hero_bg_image_mobile:
    type: image
    label: Hero Background Image (Mobile)
    comment: "Optional mobile version. Recommended size: 1000px × 1000px. If not provided, desktop image will be used."
    cascade: true
    options:
      paths:
        uploads: public/images/hero
  
  hero_button_text:
    type: text
    label: Hero Button Text
    comment: "Leave empty if you don't want to add a button"
    cascade: true
  
  hero_button_link:
    type: text
    label: Hero Button Link
    comment: "Enter the URL or page path (e.g., /our-food)"
    cascade: true
  
  hero_button_variant:
    type: select
    label: Hero Button Style
    options:
      values:
        - primary
        - secondary
    cascade: true
  
  # ------------------------------------
  # PAGE BLOCK INPUTS
  # ------------------------------------
  background_type:
    type: select
    label: Background Type
    comment: "Choose a background for this section (optional)"
    options:
      values:
        - none
        - color
        - image
    cascade: true
  
  background_colour:
    type: color
    label: Background Colour
    comment: "Only applies if Background Type is set to 'color'. Enter a hex value or use the colour picker."
    options:
      format: hex
      alpha: false
    cascade: true
  
  background_image:
    type: image
    label: Background Image
    comment: "Only applies if Background Type is set to 'image'. Image will be tiled across the section."
    cascade: true
  
  button_text:
    type: text
    label: Button Text
    comment: "Leave empty if you don't want to add a button"
    cascade: true
  
  button_link:
    type: text
    label: Button Link
    comment: "Enter the URL or page path (e.g., /our-food)"
    cascade: true
  
  button_variant:
    type: select
    label: Button Style
    options:
      values:
        - primary
        - secondary
    cascade: true
  
  page_blocks:
    type: array
    options:
      structures:
        style: select
        values:
          - label: 2 Column
            icon: pause
            value:
              _template: feature
              heading: New Section
              text: <p>Write content here...</p>
              image_path: /uploads/placeholder.jpg
              reverse: false
              background_type: none
              background_colour: ""
              background_image: ""
              button_text: ""
              button_link: ""
              button_variant: primary
            _inputs:
              heading:
                type: text
                label: Heading
              text:
                type: html
                options:
                  allow_resize: true
                  allow_custom_markup: false
                  remove_custom_markup: false
                  initial_height: 320
                  bold: true
                  format: p h2 h3 h4
                  image_size_attributes: true
                  italic: true
                label: Content (WYSIWYG)
              image_path:
                type: image
                label: Image
                comment: "Upload a square image (1:1 ratio) for best results. Recommended size: 1000px by 1000px"
              reverse:
                type: switch
                label: Reverse layout
                comment: "Default: Text left, Image right. Toggle ON to swap columns."
              _template:
                hidden: true
          - label: 1 Column
            icon: format_align_center
            value:
              _template: centered_text
              text: <p>Write your content here...</p>
              background_type: none
              background_colour: ""
              background_image: ""
              button_text: ""
              button_link: ""
              button_variant: primary
            _inputs:
              text:
                type: html
                options:
                  allow_resize: true
                  allow_custom_markup: false
                  remove_custom_markup: false
                  initial_height: 320
                  bold: true
                  format: p h2 h3 h4
                  image_size_attributes: true
                  italic: true
                label: Content (WYSIWYG)
              _template:
                hidden: true
    label: Page Blocks
    cascade: true
  
  # ------------------------------------
  # FRANCHISE CALLOUT INPUTS
  # ------------------------------------
  "franchise_callout.show":
    type: switch
    label: Show Franchise Callout
    cascade: true
  
  "franchise_callout.heading":
    type: text
    label: Franchise Heading
    cascade: true
  
  "franchise_callout.text":
    type: html
    options:
      allow_resize: true
      allow_custom_markup: false
      remove_custom_markup: false
      initial_height: 320
      bold: true
      italic: true
      format: p h2 h3 h4
      image_size_attributes: true
    label: Franchise Text (WYSIWYG)
    cascade: true
  
  "franchise_callout.image":
    type: image
    label: Franchise Image
    cascade: true
    options:
      paths:
        uploads: public/images/franchise
  
  "franchise_callout.button_text":
    type: text
    label: Franchise Button Text
    cascade: true
  
  "franchise_callout.button_link":
    type: text
    label: Franchise Button Link
    cascade: true
  
  franchise_callout:
    type: object
    label: Franchise Callout
    comment: "Configure the 'Franchise callout' section"
    cascade: true

timezone: Australia/Sydney