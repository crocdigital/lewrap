paths:
  uploads: public/images
  static: public

collections_config:
  pages:
    path: src/pages
    output: true
    icon: wysiwyg
    url: /[relative_base_path]/[slug]/
    disable_url: false
    disable_add: false
    _enabled_editors:
      - visual
      - content
      - data

_inputs:
  # -----------------------------------------------------------
  # GLOBAL INPUT DEFINITIONS
  # -----------------------------------------------------------
  
  # 1. Standard Text/HTML
  text:
    type: html
    label: Content
    options:
      bold: true
      italic: true
      link: true
      bulleted_list: true
      numbered_list: true
      format: p h2 h3 h4

  # 2. Images
  image_path:
    type: image
    label: Image
    comment: "Please upload a square image (1:1 ratio) for best results."

  # 3. Utilities
  reverse:
    type: switch
    label: Reverse columns (default is text left, image right)
  
  # 4. New Global Definitions (Moved from sub_inputs)
  heading:
    type: text
    label: Feature Heading
  
  _template:
    hidden: true

  # -----------------------------------------------------------
  # HERO INPUTS
  # -----------------------------------------------------------
  hero_title:
    type: text
    label: Hero Title
  hero_subtitle:
    type: text
    label: Hero Subtitle
  hero_bg:
    type: select
    label: Hero Background
    options:
      values:
        - value: bg-blue-50
          label: Light Blue
        - value: bg-gray-100
          label: Light Gray
        - value: bg-white
          label: White
        - value: bg-black
          label: Black

  # -----------------------------------------------------------
  # PAGE BLOCKS (The Drag-and-Drop)
  # -----------------------------------------------------------
  page_blocks:
    type: array
    label: Page Blocks
    options:
      structures:
        values:
          # The keys below automatically map to the Global Inputs defined above
          - label: 2 Column
            icon: short_text
            value:
              _template: feature
              heading: New 2 Column Section
              text: Description text
              image_path: /test-image.jpg
              reverse: false

timezone: Australia/Sydney