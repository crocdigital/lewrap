paths:
  uploads: public/images
  static: public

collections_config:
  pages:
    path: src/pages
    output: true
    url: /[slug]/
    icon: notes
    # Force all editors to be available
    _enabled_editors:
      - visual
      - content
      - data
    # Input configuration specific to this collection
    _inputs:
      page_blocks:
        type: array
        options:
          structures:
            _values:
              - value:
                  _template: hero
                  title: New Hero
                  subtitle: Subtitle here
                  bg_color: bg-gray-100
                label: Hero Section
                icon: title
              - value:
                  _template: feature
                  heading: New Feature
                  text: Description text
                  image_path: /test-image.jpg
                  reverse: false
                label: Feature Section
                icon: short_text

# We removed the 'schemas' block because pointing to an .astro file 
# breaks the input generation unless you are using specific comments.