  # ------------------------------------
  # HERO BLOCK INPUTS
  # ------------------------------------
  hero_title:
    type: text
    label: Hero Title
    cascade: true
  
  hero_subtitle:
    type: text
    label: Hero Subtitle
    cascade: true
  
  hero_bg_type:
    type: select
    label: Hero Background Type
